name: sdk-cpp-timeobserver
title: SDK C++ Time Observer
version: 1.0.1
summary: Application that measures the time offset between Layer1 and Layer0
description: "Time Observer provides continuous visibility into the time relationship between Layer 1 and Layer 0 without influencing system time synchronization. \nThe application operates as an independent NTP client, querying a plant-local time server and comparing the received time with the edge system clock (which is synchronized with the edge router).\nUsing standard NTP timestamp exchange, it computes the offset between both domains and exposes this information in the data layer.\n"
architectures:
- arm64
base: core22
apps:
  app:
    command: allDataProvider
    daemon: simple
    restart-condition: always
    plugs:
    - network
    - datalayer
    restart-delay: 10s
confinement: strict
grade: devel
environment:
  LD_LIBRARY_PATH: ${SNAP_LIBRARY_PATH}${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}:$SNAP/usr/lib:$SNAP/usr/lib/aarch64-linux-gnu
  PATH: $SNAP/usr/sbin:$SNAP/usr/bin:$SNAP/sbin:$SNAP/bin:$PATH
plugs:
  datalayer:
    content: datalayer
    interface: content
    target: $SNAP_DATA/.datalayer
